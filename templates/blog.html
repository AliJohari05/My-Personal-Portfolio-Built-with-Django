{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="section-card">
        <h2>📝 My Blog Posts</h2>
        <ul>
            {% for post in posts %}
                <li style="margin-bottom: 30px; border-bottom: 1px solid #444; padding-bottom: 15px;">
                    <strong>
                        <a href="{% url 'post_detail' post.id %}" style="color: #03dac6; text-decoration: none;">
                            {{ post.title }}
                        </a>
                    </strong>
                    <br><br>
                    {% if post.image %}
                        <img src="{{ post.image.url }}" alt="{{ post.title }}" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px;">
                    {% endif %}
                    <p>{{ post.content|truncatewords:20 }}</p>
                </li>
            {% empty %}
                <li>No posts yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
