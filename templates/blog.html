{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="section-card">
        <h2>📝 My Blog Posts</h2>
        <ul>
            {% for post in posts %}
                <li>
                    <strong>{{ post.title }}</strong>
                    <p>{{ post.content }}</p>
                </li>
            {% empty %}
                <li>No posts yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
