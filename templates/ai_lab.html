{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="section-card">
        <h2>🤖 My AI Lab Creations</h2>
        <ul>
            {% for ai in ai_creations %}
                <li style="margin-bottom: 30px; border-bottom: 1px solid #444; padding-bottom: 15px;">
                    <strong><a href="{% url 'ai_lab_detail' ai.id %}" style="color: white; text-decoration: none;">{{ ai.title }}</a></strong>

                    <small style="float: right;">Type: {{ ai.creation_type }}</small>
                    <br><br>
                    {% if ai.image %}
                        <img src="{{ ai.image.url }}" alt="{{ ai.title }}" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px;">
                    {% endif %}
                    <p>{{ ai.description }}</p>
                </li>
            {% empty %}
                <li>No AI creations yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
