{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="section-card">
        <h2>🤖 My AI Lab Creations</h2>
        <ul>
            {% for ai in ai_creations %}
                <li>
                    <strong>{{ ai.title }}</strong>
                    <small style="float: right;">Type: {{ ai.creation_type }}</small>
                    <p>{{ ai.description }}</p>
                </li>
            {% empty %}
                <li>No AI creations yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
