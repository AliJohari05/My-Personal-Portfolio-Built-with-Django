{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio & AI Lab</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

    <!-- menu (Navbar) -->
    <nav class="navbar">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'portfolio' %}">Portfolio</a>
        <a href="{% url 'blog' %}">Blog</a>
        <a href="{% url 'ai_lab' %}">AI Lab</a>
        <a href="{% url 'contact' %}">Contact</a>
    </nav>

    <header>
        <h1>My Personal Workspace</h1>
    </header>
{% if messages %}
        <div class="container" style="margin-top: 20px;">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" style="padding: 15px; background-color: #4CAF50; color: white; border-radius: 5px; margin-bottom: 10px;">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}
    {% endblock %}

</body>
</html>
