{% if messages %}
        <div class="container" style="margin-top: 20px;">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" style="padding: 15px; background-color: #4CAF50; color: white; border-radius: 5px; margin-bottom: 10px;">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
