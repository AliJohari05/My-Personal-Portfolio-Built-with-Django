<!-- templates/404.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<style>
    .error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
        color: #ddd;
    }

    .error-code {
        font-size: 8rem;
        font-weight: 900;
        margin: 0;
        background: linear-gradient(90deg, #b100ff, #00e5ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 5px;
    }

    .error-message {
        font-size: 1.5rem;
        margin-bottom: 30px;
    }

    .btn-return {
        display: inline-block;
        padding: 12px 30px;
        background: transparent;
        color: #00e5ff;
        border: 2px solid #00e5ff;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .btn-return:hover {
        background: #00e5ff;
        color: #111;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    }
</style>

<div class="error-container container">
    <h1 class="error-code">404</h1>
    <p class="error-message">Oops! The page you are looking for has vanished into the void.</p>
    <a href="{% url 'home' %}" class="btn-return">Return to Home</a>
</div>
{% endblock %}
